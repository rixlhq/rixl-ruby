name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
  contents: write # IMPORTANT: this permission is required for `rake release` to push the release tag


jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: ruby

      - name: Prepend install snippet to release notes
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          body=$(gh release view "$TAG" --repo ${{ github.repository }} --json body --jq .body)
          {
            printf '## Install\n\n```ruby\ngem "rixl-ruby", "~> %s"\n```\n\n' "$VERSION"
            printf '%s' "$body"
          } > /tmp/notes.md
          gh release edit "$TAG" --repo ${{ github.repository }} --notes-file /tmp/notes.md

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4"
          bundler-cache: "true"

      - uses: rubygems/release-gem@v1
